releaser.nbSearchItemPerPageLoad=10
releaser.urlJiraService=https://dev.lutece.paris.fr/jira/
releaser.component.jiraSearchQuery=project = {0} AND fixVersion in ({1}) AND status in (Open,Reopened, \"In Progress\", \"To Do\")