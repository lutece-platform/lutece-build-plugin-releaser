releaser.pageTitle=releaser
releaser.pagePathLabel=releaser

releaser.component.webservice.url=http://dev.lutece.paris.fr/incubator/rest/lutecetools/component/{0}?format=json&cache={1}&type={2}

releaser.mavenHomePath=
releaser.mavenLocalRepository=
releaser.mavenPrivateReleaseDeploymentRepository=
releaser.noProxyForMaven=
releaser.localSiteBasePath=
#twitter informations
releaser.consumerKey=
releaser.consumerSecret=
releaser.accessToken=
releaser.accessTokenSecret=
releaser.requestTokenURL=
releaser.authorizationURL=
releaser.accessTokenURL=
#workflow releaser
releaser.idWorkflowComponent=1
